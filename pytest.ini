[pytest]
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=allure-results

markers =
    smoke_critical: Blocker tests. If any of them fails, continuing the run is meaningless (login broken, cannot create vacancy, etc). CI is expected to run them first with -x.
    smoke: Smoke — broad but quick coverage of key flows. Run after smoke_critical.
    login: Login tests
    vacancy: Vacancy creation test
    validation: Validation tests
    modals: Modal dialog tests
    critical: Critical regression guarding a product invariant
    regression: Regression coverage
    integration: Tests depending on external integrations (e.g. hh.ru)

testpaths = tests

