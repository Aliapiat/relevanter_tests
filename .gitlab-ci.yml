# ════════════════════════════════════════════════════════════════════════════
# GitLab CI для relevanter-autotests
# ════════════════════════════════════════════════════════════════════════════
#
# Политика прогонов (та же, что и на GitHub Actions):
#
#   1) smoke_critical — fail-fast (-x). Падение здесь останавливает
#      pipeline: без зелёного smoke_critical остальные шаги не имеют
#      смысла — сломан базовый логин/создание вакансии.
#
#   2) smoke — основной стабильный набор. allow_failure: true, чтобы
#      отчёт собрался даже при 1-2 падениях.
#
#   3) affected / full_regression / single_marker — расширенные прогоны.
#      Управляются переменной SCOPE:
#         SCOPE=smoke    (default) — пункты 1 и 2
#         SCOPE=affected           — плюс тесты по git diff
#         SCOPE=all                — плюс полный регресс
#         SCOPE=vacancy|modals|login|validation — точечный маркер
#
# Требуемые CI/CD Variables (Settings → CI/CD → Variables, protected+masked):
#   ADMIN_EMAIL, ADMIN_PASSWORD         — только для tests/test_login.py
#   RECRUITER_EMAIL, RECRUITER_PASSWORD — все остальные тесты и API-cleanup

stages:
  - test
  - report
  - deploy

variables:
  TEST_ENV: dev
  SCOPE: smoke
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.cache/ms-playwright"
  PYTHONIOENCODING: "utf-8"
  GIT_DEPTH: "50"
  GIT_SUBMODULE_STRATEGY: none

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

# ─── Базовый шаблон ───────────────────────────────────────────────────────
# В corporate GitLab часто нет доступа к mcr.microsoft.com/playwright,
# поэтому берём базовый python:3.12-slim и ставим Playwright руками.
.test_base:
  stage: test
  image: python:3.12-slim
  cache:
    - key:
        files:
          - requirements.txt
      paths:
        - .cache/pip
        - .cache/ms-playwright
  before_script:
    - |
      set -e
      apt-get update -qq
      apt-get install -y --no-install-recommends -qq \
        wget ca-certificates fonts-liberation libasound2 libatk-bridge2.0-0 \
        libatk1.0-0 libcairo2 libcups2 libdbus-1-3 libdrm2 libgbm1 libglib2.0-0 \
        libnspr4 libnss3 libpango-1.0-0 libx11-6 libxcb1 libxcomposite1 \
        libxdamage1 libxext6 libxfixes3 libxkbcommon0 libxrandr2 git
      pip install --quiet --upgrade pip
      pip install --quiet -r requirements.txt
      python -m playwright install chromium
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 7 days
    reports:
      junit: allure-results/junit.xml

# ─── Step 1: smoke_critical (fail-fast) ───────────────────────────────────
smoke_critical:
  extends: .test_base
  script:
    - mkdir -p allure-results
    - pytest tests/ --env "$TEST_ENV" --alluredir=allure-results --junitxml=allure-results/junit.xml -m smoke_critical -x -v
  rules:
    - if: '$SCOPE == "vacancy" || $SCOPE == "modals" || $SCOPE == "login" || $SCOPE == "validation"'
      when: never
    - when: on_success

# ─── Step 2: smoke (остальной смок) ────────────────────────────────────────
smoke:
  extends: .test_base
  needs:
    - job: smoke_critical
      artifacts: true
      optional: true
  allow_failure: true
  script:
    - mkdir -p allure-results
    - pytest tests/ --env "$TEST_ENV" --alluredir=allure-results --junitxml=allure-results/junit.xml -m "smoke and not smoke_critical" -v
  rules:
    - if: '$SCOPE == "vacancy" || $SCOPE == "modals" || $SCOPE == "login" || $SCOPE == "validation"'
      when: never
    - if: '$SCOPE == "smoke" || $SCOPE == "affected" || $SCOPE == "all"'
      when: on_success

# ─── Step 3a: affected — тесты, затронутые diff'ом ────────────────────────
affected_regression:
  extends: .test_base
  needs:
    - job: smoke
      artifacts: true
      optional: true
  allow_failure: true
  variables:
    GIT_DEPTH: "0"
  script:
    - |
      set -e
      git fetch origin main || true
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        BASE="HEAD~1"
      else
        BASE="origin/main"
      fi
      echo "Base ref: $BASE"
      CHANGED="$(git diff --name-only $BASE...HEAD 2>/dev/null || true)"
      echo "Changed files:"
      echo "$CHANGED"
      TARGETS="$(echo "$CHANGED" | python scripts/affected_tests.py || true)"
      if [ -z "$TARGETS" ]; then
        echo "No affected tests — smoke already covers the diff."
        exit 0
      fi
      echo "Running affected: $TARGETS"
      mkdir -p allure-results
      pytest $TARGETS --env "$TEST_ENV" --alluredir=allure-results --junitxml=allure-results/junit.xml -v
  rules:
    - if: '$SCOPE == "affected"'

# ─── Step 3b: full regression ─────────────────────────────────────────────
full_regression:
  extends: .test_base
  needs:
    - job: smoke
      artifacts: true
      optional: true
  allow_failure: true
  script:
    - mkdir -p allure-results
    - pytest tests/ --env "$TEST_ENV" --alluredir=allure-results --junitxml=allure-results/junit.xml -m "not smoke and not smoke_critical" -v
  rules:
    - if: '$SCOPE == "all"'

# ─── Step 3c: точечный маркер для отладки ─────────────────────────────────
single_marker:
  extends: .test_base
  script:
    - mkdir -p allure-results
    - pytest tests/ --env "$TEST_ENV" --alluredir=allure-results --junitxml=allure-results/junit.xml -m "$SCOPE" -v
  rules:
    - if: '$SCOPE == "vacancy" || $SCOPE == "modals" || $SCOPE == "login" || $SCOPE == "validation"'

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: report — генерация HTML Allure-отчёта
# ═══════════════════════════════════════════════════════════════════════════
generate_report:
  stage: report
  image: openjdk:17-slim
  when: always
  needs:
    - job: smoke_critical
      artifacts: true
      optional: true
    - job: smoke
      artifacts: true
      optional: true
    - job: affected_regression
      artifacts: true
      optional: true
    - job: full_regression
      artifacts: true
      optional: true
    - job: single_marker
      artifacts: true
      optional: true
  cache:
    - key: "allure-history-${CI_COMMIT_REF_SLUG}"
      paths:
        - .allure-history/
    - key: allure-cli-2.30.0
      paths:
        - .allure-cli/
  script:
    - |
      set -e
      apt-get update -qq && apt-get install -y -qq wget tar >/dev/null
      if [ ! -d ".allure-cli/allure-2.30.0" ]; then
        mkdir -p .allure-cli
        wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
        tar -xzf allure.tgz -C .allure-cli
        rm allure.tgz
      fi
      export PATH="$CI_PROJECT_DIR/.allure-cli/allure-2.30.0/bin:$PATH"
      allure --version
      if [ -d ".allure-history" ] && [ "$(ls -A .allure-history 2>/dev/null)" ]; then
        echo "Восстанавливаем историю из кэша"
        mkdir -p allure-results
        cp -r .allure-history allure-results/history
      fi
      mkdir -p allure-results
      allure generate allure-results --clean -o allure-report
      rm -rf .allure-history
      cp -r allure-report/history .allure-history || true
  artifacts:
    when: always
    paths:
      - allure-report/
    expire_in: 30 days

# ═══════════════════════════════════════════════════════════════════════════
# STAGE: deploy — GitLab Pages (только для main)
# ═══════════════════════════════════════════════════════════════════════════
pages:
  stage: deploy
  image: alpine:latest
  when: always
  needs:
    - job: generate_report
      artifacts: true
  script:
    - rm -rf public
    - mv allure-report public
    - ls public/index.html || echo "index.html not found in allure-report"
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
